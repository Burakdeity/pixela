# PIXELA — Nginx ornegi (TUM istekler Node proxy uzerinden gitmeli)
# /etc/nginx/sites-available/pixela  ->  sites-enabled

server {
    listen 80;
    server_name ornek-domain.com www.ornek-domain.com;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ONEMLI: _next chunk cache KAPALI — Node Turkce patch uygular
        proxy_cache off;
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
    }
}
